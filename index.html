<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jessie C. Moore Torres - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --accent-color: #0066cc;
            --border-color: #e0e0e0;
            --hover-color: #f5f5f5;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #66b3ff;
            --border-color: #333333;
            --hover-color: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            transition: all 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            padding: 2rem 0;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 2rem;
        }

        /* --- OUTLINE BUTTON STYLES --- */
        .project-links {
            display: flex;
            gap: 15px;
            margin: 1.5rem 0;
        }

        .outline-button {
            padding: 10px 20px;
            color: var(--accent-color);
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            border-radius: 5px;
            border: 2px solid var(--accent-color);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background-color: transparent;
        }

        .outline-button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color) !important;
        }

        /* Navigation Styles */
        .main-nav {
            display: flex;
            justify-content: center;
            margin: 2rem 0 3rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            color: var(--text-color);
            opacity: 0.6;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .nav-btn.active {
            opacity: 1;
            border-bottom-color: var(--accent-color);
        }

        /* Content Sections */
        .content-section {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
